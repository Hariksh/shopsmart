services:
  backend:
    image: hariksh2007/shopsmart-backend:latest
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    env_file:
      - ./server/.env
    restart: unless-stopped

  frontend:
    image: hariksh2007/shopsmart_frontend:latest
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://backend:5001
    depends_on:
      - backend
    restart: unless-stopped
